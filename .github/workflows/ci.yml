name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Lint & Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge_secret
          POSTGRES_DB: agentforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U agentforge
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://agentforge:agentforge_secret@localhost:5432/agentforge

      - name: Run linter
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:run

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://agentforge:agentforge_secret@localhost:5432/agentforge
          AUTH_SECRET: test-secret-for-ci
          QWEN_API_KEY: test-key
