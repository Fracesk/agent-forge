version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: agentforge-postgres
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge_secret
      POSTGRES_DB: agentforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentforge-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://agentforge:agentforge_secret@postgres:5432/agentforge
      - AUTH_URL=http://localhost:3000
      - AUTH_SECRET=${AUTH_SECRET:-change-me-in-production}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen:qwen3.7-max}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentforge-network

volumes:
  postgres_data:

networks:
  agentforge-network:
    driver: bridge
